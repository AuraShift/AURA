<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Image Transformer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080808; --surface:#111; --border:#1e1e1e; --border-bright:#2a2a2a;
    --text:#f0f0f0; --text-dim:#666; --text-muted:#333;
    --accent:#e8ff00; --accent-dim:rgba(232,255,0,0.08);
    --red:#ff3b3b; --green:#4cff91; --orange:#ffb347;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; overflow-x:hidden; }

  /* Noise texture */
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:0.35;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }

  header { padding:24px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:rgba(8,8,8,0.93); backdrop-filter:blur(20px); z-index:100; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; letter-spacing:0.12em; color:var(--accent); }
  .logo span { color:var(--text-dim); font-weight:400; font-size:10px; display:block; letter-spacing:0.22em; margin-top:2px; }
  .pill { font-size:10px; letter-spacing:0.14em; color:var(--text-dim); border:1px solid var(--border-bright); padding:6px 14px; border-radius:100px; transition:all .25s; }
  .pill.active { color:var(--accent); border-color:rgba(232,255,0,.3); background:var(--accent-dim); }
  .pill.done   { color:var(--green); border-color:rgba(76,255,145,.3); background:rgba(76,255,145,.06); }
  .pill.error  { color:var(--red);   border-color:rgba(255,59,59,.3);  background:rgba(255,59,59,.06); }

  main { max-width:1400px; margin:0 auto; padding:40px; display:grid; grid-template-columns:370px 1fr; gap:32px; min-height:calc(100vh - 81px); }

  /* ── LEFT PANEL ── */
  .left { display:flex; flex-direction:column; gap:18px; }
  .lbl { font-size:9px; letter-spacing:.25em; color:var(--text-muted); text-transform:uppercase; margin-bottom:7px; }

  /* API key */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .key-row { display:flex; gap:8px; margin-top:8px; }
  .key-input { flex:1; background:#0d0d0d; border:1px solid var(--border-bright); border-radius:6px; padding:9px 12px; color:var(--text); font-family:'DM Mono',monospace; font-size:11px; outline:none; transition:border .15s; }
  .key-input:focus { border-color:rgba(232,255,0,.4); }
  .key-input::placeholder { color:var(--text-muted); }
  .save-btn { background:var(--accent); color:#000; border:none; border-radius:6px; padding:9px 16px; font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.08em; cursor:pointer; transition:opacity .15s; white-space:nowrap; }
  .save-btn:hover { opacity:.85; }
  .key-msg { font-size:9px; letter-spacing:.07em; margin-top:7px; color:var(--text-muted); }
  .key-msg.ok   { color:var(--green); }
  .key-msg.warn { color:var(--orange); }

  /* Upload */
  #fileInput { display:none; }
  .drop { border:1px dashed var(--border-bright); border-radius:10px; padding:26px 20px; text-align:center; cursor:pointer; background:var(--surface); transition:all .2s; }
  .drop:hover, .drop.over { border-color:var(--accent); background:var(--accent-dim); }
  .drop-icon { width:40px; height:40px; margin:0 auto 10px; border:1px solid var(--border-bright); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .drop-txt { font-size:11px; color:var(--text-dim); line-height:1.6; }
  .drop-txt strong { color:var(--text); font-weight:400; display:block; margin-bottom:3px; }
  .prev-img { width:100%; border-radius:8px; max-height:230px; object-fit:cover; display:block; }
  .img-meta { font-size:10px; color:var(--text-dim); margin-top:6px; }

  /* Style grid */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .sty { border:1px solid var(--border); background:var(--surface); color:var(--text-dim); border-radius:8px; padding:11px 10px; cursor:pointer; text-align:left; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.04em; transition:all .15s; }
  .sty:hover { border-color:var(--border-bright); color:var(--text); background:#161616; }
  .sty.on { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
  .sty-name { font-size:11px; display:block; margin-bottom:2px; }
  .sty-desc { font-size:9px; color:var(--text-muted); display:block; line-height:1.5; }
  .sty.on .sty-desc { color:rgba(232,255,0,.4); }

  /* Generate */
  .gen { width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:10px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:.12em; cursor:pointer; transition:all .2s; }
  .gen:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 8px 28px rgba(232,255,0,.22); }
  .gen:disabled { background:var(--border-bright); color:var(--text-muted); cursor:not-allowed; transform:none; box-shadow:none; }

  /* Error */
  .err { background:rgba(255,59,59,.07); border:1px solid rgba(255,59,59,.2); border-radius:8px; padding:12px 15px; font-size:10px; color:var(--red); line-height:1.75; }
  .err a { color:var(--orange); }
  .err strong { display:block; margin-bottom:4px; font-size:10px; }

  /* ── RIGHT PANEL ── */
  .right { display:flex; flex-direction:column; gap:16px; }
  .out-head { display:flex; align-items:center; justify-content:space-between; }
  .out { flex:1; border:1px solid var(--border); border-radius:12px; background:var(--surface); min-height:520px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .empty { text-align:center; color:var(--text-muted); }
  .empty-icon { font-size:46px; margin-bottom:14px; opacity:.2; }
  .empty p { font-size:11px; letter-spacing:.1em; line-height:1.9; }
  .out-img { width:100%; height:100%; object-fit:contain; border-radius:12px; padding:12px; display:block; }
  .badge { position:absolute; top:14px; left:14px; background:rgba(8,8,8,.88); border:1px solid var(--border-bright); border-radius:100px; padding:5px 12px; font-size:10px; letter-spacing:.12em; color:var(--accent); backdrop-filter:blur(10px); }

  /* Loading overlay */
  .loading { position:absolute; inset:0; background:rgba(8,8,8,.9); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:10; border-radius:12px; }
  .spin { width:36px; height:36px; border:2px solid var(--border-bright); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .load-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--accent); letter-spacing:.08em; }
  .load-bar-wrap { width:200px; height:2px; background:var(--border-bright); border-radius:2px; overflow:hidden; }
  .load-bar { height:100%; width:0%; background:var(--accent); border-radius:2px; transition:width 1s linear, background .3s; }
  .load-msg { font-size:10px; color:var(--text-dim); letter-spacing:.08em; animation:pulse 1.8s ease infinite; }
  .load-elapsed { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--text-muted); margin-top:2px; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* Download */
  .dl { border:1px solid var(--border-bright); background:transparent; color:var(--text-dim); border-radius:8px; padding:9px 16px; cursor:pointer; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; transition:all .15s; display:flex; align-items:center; gap:6px; }
  .dl:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .dl:disabled { opacity:.3; cursor:not-allowed; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border-bright); border-radius:4px; }

  @media(max-width:900px) { main { grid-template-columns:1fr; padding:24px 20px; } header { padding:20px; } }
</style>
</head>
<body>

<header>
  <div class="logo">AURA <span>IMAGE TRANSFORMER</span></div>
  <div class="pill" id="pill">GEMINI POWERED</div>
</header>

<main>
  <!-- LEFT -->
  <div class="left">

    <div>
      <div class="lbl">00 — API Key</div>
      <div class="card">
        <div class="key-row">
          <input type="password" class="key-input" id="keyIn" placeholder="Paste your Gemini API key..." autocomplete="off">
          <button class="save-btn" id="saveBtn">SAVE</button>
        </div>
        <div class="key-msg warn" id="keyMsg">⚠ Enter your key to begin</div>
      </div>
    </div>

    <div>
      <div class="lbl">01 — Source Image</div>
      <input type="file" id="fileInput" accept="image/*">
      <div class="drop" id="drop">
        <div id="dropContent">
          <div class="drop-icon">📷</div>
          <div class="drop-txt">
            <strong>Click to upload</strong>
            or drag &amp; drop
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="lbl">02 — Style</div>
      <div class="grid2" id="styleGrid"></div>
    </div>

    <button class="gen" id="genBtn" disabled>✦ &nbsp;Transform Image</button>
    <div id="errBox" style="display:none"></div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="out-head">
      <div class="lbl" style="margin-bottom:0">03 — Result</div>
      <button class="dl" id="dlBtn" disabled>↓ Download</button>
    </div>
    <div class="out" id="outArea">
      <div class="empty" id="emptyEl">
        <div class="empty-icon">✦</div>
        <p>Set your API key,<br>upload an image,<br>choose a style</p>
      </div>
    </div>
  </div>
</main>

</script>

<script>
const { GoogleGenAI } = GenAI;

const STYLES = [
  { id:'soft-focus',    name:'Soft Focus',    desc:'Blurred bg, backlighting',
    prompt:'Photography post-processing: apply a shallow depth-of-field effect. Gaussian blur the background while keeping the foreground in sharp focus. Add gentle backlighting with a soft halo rim around the foreground figure. Pristine digital clarity, smooth tonal gradations, deep blacks, no grain.' },
  { id:'lofi-dusk',     name:'Lofi Dusk',     desc:'Night flash, rim light',
    prompt:'Photography lighting retouch: apply a night-flash cinematic color grade. Darken and desaturate the background with added film grain, darker tones at the top. Simulate direct front-facing camera flash with strong backlighting creating a brilliant rim light halo. High contrast cinematic mood, warm peach highlight tones on skin.' },
  { id:'outline-glow',  name:'Outline Glow',  desc:'Digital aura, white stroke',
    prompt:'Photo compositing effect: detect the foreground silhouette and add a subtle white luminous glow stroke tracing its outline, with soft diffused light radiating outward. The background remains completely photorealistic and unaltered. Pristine sharpness, high clarity, no grain or distortion.' },
  { id:'sparkle-aura',  name:'Sparkle Aura',  desc:'Glitter outline, radiant',
    prompt:'Photo compositing effect: add sparkling glitter particles and a shimmer aura radiating along the edges of the foreground figure silhouette. The background and environment remain photorealistic and unaltered. Pristine digital clarity, high-fidelity sharpness.' },
  { id:'dreamy-film',   name:'Dreamy Film',   desc:'Grain, golden hour glow',
    prompt:'Analog film emulation color grade: add fine-grain film texture, intentionally soft diffusion glow simulating a vintage lens, warm golden-hour color temperature, earthy tones, lifted shadows, and a nostalgic hazy atmosphere throughout.' },
  { id:'dark-stage',    name:'Dark Stage',    desc:'Black wall, flash lit',
    prompt:'Background replacement and lighting retouch: replace the background with a solid deep black studio backdrop. Simulate an intense direct studio strobe flash on the foreground, creating sharp hard-edged shadows. Pristine clarity, high contrast, deep blacks, no grain.' },
  { id:'red-glow',      name:'Red Glow',      desc:'35mm tungsten film',
    prompt:'35mm film emulation: apply a tungsten-balanced motion picture film color grade with direct on-camera flash simulation. Split-tone cyan shadows and warm amber-orange highlights, desaturated greens, coarse organic grain, slight softness. Add red-orange halation bloom on bright specular highlights and reflective surfaces.' },
  { id:'90s-summer',    name:'90s Summer',    desc:'Analog film, warm tones',
    prompt:'1990s summer editorial film color grade: warm analog film tone, slightly overexposed highlights, boosted warm peachy-orange midtones, contrasting cool cyan-blue shadows and environment, subtle grain and softness.' },
  { id:'studio-dark',   name:'Studio Dark',   desc:'Dark gradient, rim light',
    prompt:'Background replacement and studio lighting retouch: replace the background with a deep dark gradient (darkest at top, slightly lighter at bottom) with subtle film grain texture. Apply bright studio strobe flash lighting with a strong rim backlight halo effect on the foreground. Deep blacks, high clarity.' },
  { id:'seasonal-grid', name:'Seasonal Grid', desc:'4-panel crayon seasons',
    prompt:'Create a 2x2 four-panel grid image layout using this photo. Each panel is identical except for hand-drawn crayon illustration overlays: top-left panel adds snowflakes and frost crystals, top-right panel adds flowers and blossoms, bottom-left panel adds flames and sun rays, bottom-right panel adds falling autumn leaves. Panels touch edge-to-edge with no gaps.' }
];

// Preferred models — fastest / most capable first
const MODEL_PRIORITY = [
  'gemini-2.5-flash-image',
  'gemini-3.1-flash-image',
  'gemini-2.0-flash-exp-image-generation',
];

let ai = null, apiKeyVal = '';
let resolvedModel = null;
let selectedStyle = null;
let uploadedB64 = null, uploadedMime = null;
let isLoading = false;
let loadTimer = null, loadStart = null;

// Elements
const keyIn     = document.getElementById('keyIn');
const saveBtn   = document.getElementById('saveBtn');
const keyMsg    = document.getElementById('keyMsg');
const drop      = document.getElementById('drop');
const dropCont  = document.getElementById('dropContent');
const fileInput = document.getElementById('fileInput');
const styleGrid = document.getElementById('styleGrid');
const genBtn    = document.getElementById('genBtn');
const dlBtn     = document.getElementById('dlBtn');
const outArea   = document.getElementById('outArea');
const emptyEl   = document.getElementById('emptyEl');
const errBox    = document.getElementById('errBox');
const pill      = document.getElementById('pill');

// ── Render styles ──
STYLES.forEach(s => {
  const b = document.createElement('button');
  b.className = 'sty'; b.dataset.id = s.id;
  b.innerHTML = `<span class="sty-name">${s.name}</span><span class="sty-desc">${s.desc}</span>`;
  b.onclick = () => {
    selectedStyle = s.id;
    document.querySelectorAll('.sty').forEach(x => x.classList.toggle('on', x.dataset.id === s.id));
    updateBtn();
  };
  styleGrid.appendChild(b);
});

// ── API Key ──
saveBtn.onclick = () => {
  const v = keyIn.value.trim(); if (!v) return;
  apiKeyVal = v;
  ai = new GoogleGenAI({ apiKey: v });
  resolvedModel = null;
  keyIn.value = '';
  keyMsg.textContent = '✓ Key saved — ready';
  keyMsg.className = 'key-msg ok';
  updateBtn();
};
keyIn.onkeydown = e => { if (e.key === 'Enter') saveBtn.click(); };

// ── Upload ──
drop.onclick = () => fileInput.click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
fileInput.onchange = e => { if (e.target.files[0]) handleFile(e.target.files[0]); };

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  uploadedMime = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedB64 = ev.target.result.split(',')[1];
    dropCont.innerHTML = `<img src="${ev.target.result}" class="prev-img"><div class="img-meta">${file.name} · ${(file.size/1024).toFixed(0)} KB</div>`;
    clearErr();
    updateBtn();
  };
  reader.readAsDataURL(file);
}

function updateBtn() {
  genBtn.disabled = !ai || !selectedStyle || !uploadedB64 || isLoading;
}

// ── Model discovery ──
async function getModel() {
  if (resolvedModel) return resolvedModel;

  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKeyVal}&pageSize=200`);
  const data = await r.json();
  if (data.error) throw new Error('Could not list models: ' + data.error.message);

  const available = new Set(
    (data.models || [])
      .filter(m => (m.supportedGenerationMethods || []).includes('generateContent'))
      .map(m => m.name.replace('models/', ''))
  );
  console.log('[AURA] Available models:', [...available]);

  for (const m of MODEL_PRIORITY) {
    if (available.has(m)) { resolvedModel = m; break; }
  }
  if (!resolvedModel) {
    // fallback: any model with 'image' in name
    resolvedModel = [...available].find(n => n.includes('image'));
  }
  if (!resolvedModel) throw new Error('No image-generation model found for this API key.');
  console.log('[AURA] Using model:', resolvedModel);
  return resolvedModel;
}

// ── Generate ──
genBtn.onclick = async () => {
  if (!ai || !selectedStyle || !uploadedB64 || isLoading) return;
  const style = STYLES.find(s => s.id === selectedStyle); if (!style) return;

  isLoading = true; updateBtn(); clearErr();
  showLoading(style.name);
  pill.textContent = 'GENERATING...'; pill.className = 'pill active';

  try {
    const model = await getModel();
    console.log('[AURA] Generating with:', model);

    // 90s timeout
    const controller = new AbortController();
    const timeoutId = setTimeout(() => {
      controller.abort();
    }, 90000);

    let response;
    try {
      response = await ai.models.generateContent({
        model,
        contents: [{
          role: 'user',
          parts: [
            { inlineData: { mimeType: uploadedMime, data: uploadedB64 } },
            { text: style.prompt }
          ]
        }],
        config: { responseModalities: ['IMAGE', 'TEXT'] }
      });
    } catch (fetchErr) {
      if (fetchErr.name === 'AbortError' || String(fetchErr).includes('abort')) {
        resolvedModel = null;
        throw new Error('Request timed out after 90s. The server may be busy — please retry.');
      }
      throw fetchErr;
    } finally {
      clearTimeout(timeoutId);
    }

    // Extract image
    let imgData = null, imgMime = 'image/png';
    const parts = response.candidates?.[0]?.content?.parts || [];
    for (const p of parts) {
      if (p.inlineData?.data) { imgData = p.inlineData.data; imgMime = p.inlineData.mimeType || 'image/png'; break; }
    }

    if (!imgData) {
      const textParts = parts.filter(p => p.text).map(p => p.text).join(' ');
      throw new Error('No image returned.' + (textParts ? ' Model said: ' + textParts : ' Try a different style.'));
    }

    stopLoading();
    showOutput(imgData, imgMime, style.name);
    dlBtn.disabled = false;
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = `data:${imgMime};base64,${imgData}`;
      a.download = `aura-${style.id}-${Date.now()}.${imgMime.split('/')[1] || 'png'}`;
      a.click();
    };
    pill.textContent = 'COMPLETE'; pill.className = 'pill done';

  } catch (err) {
    stopLoading();
    showErr(err.message || String(err));
    pill.textContent = 'ERROR'; pill.className = 'pill error';
  } finally {
    isLoading = false; updateBtn();
  }
};

// ── Loading UI ──
const LOAD_MSGS = [
  [0,  'Sending image to Gemini...'],
  [3,  'Analysing style prompt...'],
  [8,  'Generating transformation...'],
  [15, 'Rendering details...'],
  [25, 'Applying final touches...'],
  [40, 'Almost there...'],
  [60, 'Taking longer than usual — still working...'],
  [80, 'Will timeout at 90s if no response...'],
];

function showLoading(name) {
  outArea.querySelector('.loading')?.remove();
  if (loadTimer) clearInterval(loadTimer);
  loadStart = Date.now();

  const el = document.createElement('div'); el.className = 'loading';
  el.innerHTML = `
    <div class="spin"></div>
    <div class="load-name">${name}</div>
    <div class="load-bar-wrap"><div class="load-bar" id="lBar"></div></div>
    <div class="load-msg" id="lMsg">Sending image to Gemini...</div>
    <div class="load-elapsed" id="lTime">0s</div>
  `;
  outArea.appendChild(el);
  emptyEl.style.display = 'none';

  loadTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - loadStart) / 1000);
    const lTime = document.getElementById('lTime');
    const lMsg  = document.getElementById('lMsg');
    const lBar  = document.getElementById('lBar');
    if (lTime) lTime.textContent = elapsed + 's';
    if (lBar)  lBar.style.width = Math.min(95, (elapsed / 90) * 100) + '%';
    if (lMsg) {
      let msg = LOAD_MSGS[0][1];
      for (const [t, m] of LOAD_MSGS) { if (elapsed >= t) msg = m; }
      lMsg.textContent = msg;
    }
  }, 1000);
}

function stopLoading() {
  if (loadTimer) { clearInterval(loadTimer); loadTimer = null; }
  const lBar = document.getElementById('lBar');
  if (lBar) { lBar.style.width = '100%'; lBar.style.background = 'var(--green)'; }
  setTimeout(hideLoading, 300);
}

function hideLoading() {
  outArea.querySelector('.loading')?.remove();
  if (!outArea.querySelector('img')) emptyEl.style.display = '';
}

function showOutput(b64, mime, name) {
  outArea.querySelector('img')?.remove();
  outArea.querySelector('.badge')?.remove();
  const img = document.createElement('img'); img.className = 'out-img';
  img.src = `data:${mime};base64,${b64}`;
  outArea.appendChild(img);
  const badge = document.createElement('div'); badge.className = 'badge';
  badge.textContent = name.toUpperCase();
  outArea.appendChild(badge);
  emptyEl.style.display = 'none';
}

function showErr(msg) {
  errBox.style.display = 'block';
  const isQuota = msg.includes('429') || msg.toLowerCase().includes('quota') || msg.toLowerCase().includes('exhausted') || msg.toLowerCase().includes('exceeded');
  if (isQuota) {
    const secMatch = msg.match(/(\d+)\s*s/);
    const secs = secMatch ? parseInt(secMatch[1]) : 60;
    errBox.innerHTML = `<div class="err">
      <strong>⚠ Quota exceeded — free tier limit reached</strong>
      Options:<br>
      1. Wait ~${secs}s and retry (per-minute quota)<br>
      2. <a href="https://aistudio.google.com/apikey" target="_blank">Create a new API key</a> (fresh daily quota)<br>
      3. <a href="https://console.cloud.google.com/billing" target="_blank">Check billing</a> — ensure paid tier is active
    </div>`;
  } else {
    errBox.innerHTML = `<div class="err">⚠ ${msg}</div>`;
  }
}

function clearErr() { errBox.style.display = 'none'; errBox.innerHTML = ''; }
</script>
