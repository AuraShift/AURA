<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Image Transformer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --border: #1e1e1e;
    --border-bright: #2a2a2a;
    --text: #f0f0f0;
    --text-dim: #666;
    --text-muted: #333;
    --accent: #e8ff00;
    --accent-dim: rgba(232,255,0,0.08);
    --accent-glow: rgba(232,255,0,0.15);
    --red: #ff3b3b;
    --card-hover: #161616;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  header {
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.12em;
    color: var(--accent);
  }

  .logo span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 11px;
    display: block;
    letter-spacing: 0.2em;
    margin-top: 1px;
  }

  .status-pill {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    border: 1px solid var(--border-bright);
    padding: 6px 14px;
    border-radius: 100px;
  }

  .status-pill.active {
    color: var(--accent);
    border-color: rgba(232,255,0,0.3);
    background: var(--accent-dim);
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 40px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 32px;
    min-height: calc(100vh - 80px);
  }

  /* LEFT PANEL */
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Upload Zone */
  .upload-zone {
    border: 1px dashed var(--border-bright);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--surface);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  #fileInput {
    display: none;
  }

  .upload-icon {
    width: 40px;
    height: 40px;
    margin: 0 auto 12px;
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .upload-text {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .upload-text strong {
    color: var(--text);
    font-weight: 400;
    display: block;
    margin-bottom: 4px;
  }

  .preview-img {
    width: 100%;
    border-radius: 8px;
    display: block;
    max-height: 260px;
    object-fit: cover;
  }

  .img-info {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* Style Grid */
  .styles-section {
    flex: 1;
  }

  .styles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .style-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 12px 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    line-height: 1.4;
  }

  .style-btn:hover {
    border-color: var(--border-bright);
    background: var(--card-hover);
    color: var(--text);
  }

  .style-btn.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .style-btn .style-name {
    font-size: 11px;
    font-weight: 400;
    display: block;
    margin-bottom: 3px;
    color: inherit;
  }

  .style-btn .style-desc {
    font-size: 9px;
    color: var(--text-muted);
    display: block;
    line-height: 1.5;
  }

  .style-btn.selected .style-desc {
    color: rgba(232,255,0,0.5);
  }

  /* Generate Button */
  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(232,255,0,0.25);
  }

  .generate-btn:disabled {
    background: var(--border-bright);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .generate-btn .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* RIGHT PANEL */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .output-area {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
  }

  .empty-state .big-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 11px;
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  .output-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    border-radius: 12px;
    padding: 12px;
  }

  /* Loading state */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,8,8,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    border-radius: 12px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border-bright);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .loading-style-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  /* Download button */
  .download-btn {
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--text-dim);
    border-radius: 8px;
    padding: 10px 18px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .download-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .download-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Error */
  .error-box {
    background: rgba(255,59,59,0.08);
    border: 1px solid rgba(255,59,59,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 11px;
    color: var(--red);
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  /* Applied style badge */
  .applied-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(8,8,8,0.85);
    border: 1px solid var(--border-bright);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--accent);
    backdrop-filter: blur(10px);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

  /* Responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; padding: 24px 20px; }
    header { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    AURA
    <span>IMAGE TRANSFORMER</span>
  </div>
  <div class="status-pill" id="statusPill">GEMINI POWERED</div>
</header>

<main>
  <!-- LEFT -->
  <div class="left-panel">
    <div>
      <div class="panel-label">01 — Source Image</div>
      <input type="file" id="fileInput" accept="image/*">
    <div class="upload-zone" id="uploadZone">
        <div id="uploadContent">
          <div class="upload-icon">📷</div>
          <div class="upload-text">
            <strong>Click to upload</strong>
            or drag &amp; drop an image
          </div>
        </div>
      </div>
    </div>

    <div class="styles-section">
      <div class="panel-label">02 — Choose Style</div>
      <div class="styles-grid" id="stylesGrid"></div>
    </div>

    <div>
      <button class="generate-btn" id="generateBtn" disabled>
        <div class="btn-inner">
          <span>✦</span>
          <span>Transform Image</span>
        </div>
      </button>
    </div>

    <div id="errorBox" style="display:none"></div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="output-header">
      <div class="panel-label" style="margin-bottom:0">03 — Result</div>
      <button class="download-btn" id="downloadBtn" disabled>
        ↓ Download
      </button>
    </div>

    <div class="output-area" id="outputArea">
      <div class="empty-state" id="emptyState">
        <div class="big-icon">✦</div>
        <p>Upload an image and<br>select a style to begin</p>
      </div>
    </div>
  </div>
</main>

<script>
const API_KEY = 'AIzaSyBOauMBEPGzfhQr3dqKk0ezOcQLEvAMq4Y';

const STYLES = [
  {
    id: 'soft-focus',
    name: 'Soft Focus',
    desc: 'Blurred bg, backlighting',
    prompt: 'Blur the background behind the subject. Background: Blur the background behind the subject with a gentle soft focus blur. Pose: keep the same. Retain the source image\'s character facial features, skin tone, and exact clothing. Lighting: Backlighting. Effects: Pristine digital clarity and high-fidelity sharpness. Smooth tonal gradations and deep blacks are presented without grain or optical distortion for a hyper-clear surface.'
  },
  {
    id: 'lofi-dusk',
    name: 'Lofi Dusk',
    desc: 'Night flash, rim light',
    prompt: 'Relight image. Background: Deep and muted, darker tone at the top, grainy. Lighting: Bold night-flash aesthetic combining natural light with direct front-facing flash. Tiny highlights. Strong backlighting creating a brilliant rim light around the subject, with a soft fill light from the front. Cinematic high-contrast mood. Skin rendered with gentle peachy tones.'
  },
  {
    id: 'outline-glow',
    name: 'Outline Glow',
    desc: 'Digital aura, white stroke',
    prompt: 'Transform image. Layer 1: source image. Layer 2: Draw the aura around the outline of the subjects and keep the environment unchanged and photorealistic. Remove aura from all objects. Aura Style: subtle digital glow outlining and radiating off of the subjects, visible white stroke. Lighting Effects: Pristine digital clarity and high-fidelity sharpness. Smooth tonal gradations presented without grain or optical distortion for a hyper-clear surface. Retain the source image\'s character facial features, skin tone, and exact clothing.'
  },
  {
    id: 'sparkle-aura',
    name: 'Sparkle Aura',
    desc: 'Glitter outline, radiant',
    prompt: 'transform image. draw the aura around the outline of the subjects and keep the environment unchanged and photorealistic. Aura Style: sparkling glitter outlining and radiating off of the subjects. Lighting Effects: Pristine digital clarity and high-fidelity sharpness. Smooth tonal gradations presented without grain or optical distortion for a hyper-clear surface.'
  },
  {
    id: 'dreamy-film',
    name: 'Dreamy Film',
    desc: 'Grain, golden hour glow',
    prompt: 'Transform image. Film Effect & Texture: fine grain film aesthetic and a nostalgic quality. Focus & Depth: intentionally soft overall focus, resulting in a dreamy scene. Lighting: subtle warm golden hour sunlight casting a soft, diffused glow across the scene. Color Grading: earthy, warm palette dominated by rich colors, soft whites, and deep organic shadowing.'
  },
  {
    id: 'dark-stage',
    name: 'Dark Stage',
    desc: 'Black wall, flash lit',
    prompt: 'Change the background behind the subject. Background: a minimalist studio setting with a solid black wall. Shadows: sharp, well-defined shadows. Keep everything else the same. Lightning: intense flash. Pose: keep the same. Effects: Pristine digital clarity and high-fidelity sharpness. Smooth tonal gradations and deep blacks.'
  },
  {
    id: 'red-glow',
    name: 'Red Glow',
    desc: '35mm tungsten film look',
    prompt: 'Restyle source image as a handheld 35mm photograph shot on tungsten-balanced motion picture film stock with direct on-camera flash. Split-tone cyan shadows and warm amber-orange highlights with pronounced separation, muted greens, natural skin tones, competing warm and cool casts from tungsten/flash mismatch. Overall palette leans warm, counterbalanced by cool shadows. Visible organic grain throughout, slightly soft focus. Pop-flash snapshot aesthetic with rapid light falloff to dark, grainy, amber-tinged backgrounds. Specular highlights on surfaces create halation bloom points. Red-orange glow around bright points and specular flash reflections visible around point lights in background, catchlights in eyes, and reflective surfaces. Soft, diffuse, dreamy quality contrasting with the hard flash aesthetic.'
  },
  {
    id: '90s-summer',
    name: '90s Summer',
    desc: 'Analog film, warm tones',
    prompt: 'Transform image. Style & Aesthetics: Nostalgic 90s summer editorial photography. Light & Color: Soft natural sunlight, warm analog film grading. High contrast between warm peachy skin tones and cool blue environment.'
  },
  {
    id: 'studio-dark',
    name: 'Studio Dark',
    desc: 'Dark gradient, rim light',
    prompt: 'Change the background behind the subject. Background: Minimalist, deep and muted gradient, darker tone at the top, grainy. Keep everything else the same. Lighting: Bright studio lighting. The subjects remains lit with bright flash light. Tiny highlights. Strong backlighting creating a brilliant rim light around the subject, with a soft fill light from the front. Retain the source image\'s character facial features, skin tone, and exact clothing. Maintain: original subject. Effects: subtle film grain and sharp focus on the subjects. Pristine digital clarity and high-fidelity sharpness. Smooth tonal gradations and deep blacks are presented without grain or optical distortion for a hyper-clear surface.'
  },
  {
    id: 'seasonal-grid',
    name: 'Seasonal Grid',
    desc: '4-panel crayon seasons',
    prompt: 'Transform image. Format: four-panel grid, panels touching edge-to-edge, each containing an identical copy of the source image with seasonal elements added. Each panel is self-contained with only its listed additions. Layer 1 (all panels): keep the same photorealistic source image. Layer 2 (per panel): add childlike hand-drawn crayon elements integrated naturally in front and behind the subject. Top-Left: snowflakes. Top-Right: flowers. Bottom-Left: flames. Bottom-Right: falling leaves.'
  }
];

// State
let selectedStyle = null;
let uploadedImageBase64 = null;
let uploadedMimeType = null;
let outputImageBase64 = null;
let isLoading = false;

// Elements
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const uploadContent = document.getElementById('uploadContent');
const stylesGrid = document.getElementById('stylesGrid');
const generateBtn = document.getElementById('generateBtn');
const downloadBtn = document.getElementById('downloadBtn');
const outputArea = document.getElementById('outputArea');
const emptyState = document.getElementById('emptyState');
const errorBox = document.getElementById('errorBox');
const statusPill = document.getElementById('statusPill');

// Render styles
STYLES.forEach(style => {
  const btn = document.createElement('button');
  btn.className = 'style-btn';
  btn.dataset.id = style.id;
  btn.innerHTML = `<span class="style-name">${style.name}</span><span class="style-desc">${style.desc}</span>`;
  btn.addEventListener('click', () => selectStyle(style.id));
  stylesGrid.appendChild(btn);
});

function selectStyle(id) {
  selectedStyle = id;
  document.querySelectorAll('.style-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.id === id);
  });
  updateGenerateBtn();
}

function updateGenerateBtn() {
  generateBtn.disabled = !uploadedImageBase64 || !selectedStyle || isLoading;
}

// File upload
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  uploadedMimeType = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    uploadedImageBase64 = dataUrl.split(',')[1];

    // Show preview
    uploadContent.innerHTML = `
      <img src="${dataUrl}" class="preview-img" alt="preview">
      <div class="img-info">${file.name} · ${(file.size/1024).toFixed(0)}KB</div>
    `;
    updateGenerateBtn();
    clearError();
    clearOutput();
  };
  reader.readAsDataURL(file);
}

// Dynamically discover image-generation model from ListModels
let resolvedModel = null;
async function getImageModel() {
  if (resolvedModel) return resolvedModel;
  const r = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}&pageSize=200`
  );
  if (!r.ok) throw new Error('Could not list available models from Gemini API.');
  const data = await r.json();
  // Find models that support generateContent AND have "image" in their name
  const imgModels = (data.models || []).filter(m =>
    Array.isArray(m.supportedGenerationMethods) &&
    m.supportedGenerationMethods.includes('generateContent') &&
    m.name.toLowerCase().includes('image')
  );
  if (!imgModels.length) throw new Error('No image-generation model found for this API key. Please check your key has image generation enabled.');
  // Sort by name descending so newer versions come first
  imgModels.sort((a, b) => b.name.localeCompare(a.name));
  resolvedModel = imgModels[0].name.replace('models/', '');
  console.log('[AURA] Using model:', resolvedModel);
  return resolvedModel;
}

// Generate
generateBtn.addEventListener('click', async () => {
  if (!uploadedImageBase64 || !selectedStyle || isLoading) return;
  const style = STYLES.find(s => s.id === selectedStyle);
  if (!style) return;

  isLoading = true;
  updateGenerateBtn();
  clearError();
  showLoading(style.name);
  statusPill.textContent = 'PROCESSING...';
  statusPill.className = 'status-pill active';

  try {
    const model = await getImageModel();

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inline_data: { mime_type: uploadedMimeType, data: uploadedImageBase64 } },
            { text: style.prompt }
          ]}],
          generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
        })
      }
    );

    if (!response.ok) {
      resolvedModel = null; // reset so next click re-discovers
      const errBody = await response.json();
      throw new Error(errBody.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();

    // Find image part
    let imgData = null;
    let imgMime = 'image/png';

    const parts = data.candidates?.[0]?.content?.parts || [];
    for (const part of parts) {
      if (part.inlineData?.data) {
        imgData = part.inlineData.data;
        imgMime = part.inlineData.mimeType || 'image/png';
        break;
      }
    }

    if (!imgData) throw new Error('No image was returned. Try a different style or image.');

    outputImageBase64 = imgData;
    showOutput(imgData, imgMime, style.name);
    downloadBtn.disabled = false;
    downloadBtn.onclick = () => downloadImage(imgData, imgMime, style.id);
    statusPill.textContent = 'COMPLETE';

  } catch (err) {
    showError(err.message);
    statusPill.textContent = 'GEMINI POWERED';
    statusPill.className = 'status-pill';
    hideLoading();
  } finally {
    isLoading = false;
    updateGenerateBtn();
  }
});

function showLoading(styleName) {
  // Remove existing loading overlay
  const existing = outputArea.querySelector('.loading-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = `
    <div class="spinner"></div>
    <div class="loading-style-name">${styleName}</div>
    <div class="loading-text">Transforming your image...</div>
  `;
  outputArea.appendChild(overlay);
  emptyState.style.display = 'none';
}

function hideLoading() {
  const overlay = outputArea.querySelector('.loading-overlay');
  if (overlay) overlay.remove();
  if (!outputArea.querySelector('img')) emptyState.style.display = '';
}

function showOutput(base64, mime, styleName) {
  hideLoading();
  const existing = outputArea.querySelector('img');
  if (existing) existing.remove();
  const badge = outputArea.querySelector('.applied-badge');
  if (badge) badge.remove();

  const img = document.createElement('img');
  img.className = 'output-img';
  img.src = `data:${mime};base64,${base64}`;
  img.alt = 'Transformed image';
  outputArea.appendChild(img);

  const b = document.createElement('div');
  b.className = 'applied-badge';
  b.textContent = styleName.toUpperCase();
  outputArea.appendChild(b);
  emptyState.style.display = 'none';
}

function clearOutput() {
  const img = outputArea.querySelector('img');
  if (img) img.remove();
  const badge = outputArea.querySelector('.applied-badge');
  if (badge) badge.remove();
  emptyState.style.display = '';
  downloadBtn.disabled = true;
  outputImageBase64 = null;
}

function showError(msg) {
  hideLoading();
  errorBox.style.display = 'block';
  errorBox.className = 'error-box';
  errorBox.textContent = `⚠ ${msg}`;
}

function clearError() {
  errorBox.style.display = 'none';
}

function downloadImage(base64, mime, styleId) {
  const ext = mime.split('/')[1] || 'png';
  const link = document.createElement('a');
  link.href = `data:${mime};base64,${base64}`;
  link.download = `aura-${styleId}-${Date.now()}.${ext}`;
  link.click();
}
</script>
</body>
</html>
